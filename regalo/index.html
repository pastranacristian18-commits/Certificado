<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Certificado de regalo</title>

<style>
  html, body{
    margin:0;
    padding:0;
    background:#d9d9d9;
    font-family:Arial, Helvetica, sans-serif;
  }

  body{
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    padding:18px;
  }

  .topbar{
    width:min(1200px,100%);
    margin-bottom:10px;
    display:flex;
    justify-content:flex-end;
  }

  .btn{
    border:none;
    background:#111;
    color:#fff;
    cursor:pointer;
    padding:12px 18px;
    border-radius:999px;
    font-weight:bold;
  }

  .sheet{
    position:relative;
    width:min(1200px,100%);
    aspect-ratio:1536/942;
    overflow:hidden;
    box-shadow:0 20px 40px rgba(0,0,0,.2);
  }

  .bg{
    position:absolute;
    inset:0;
    width:100%;
    height:100%;
    object-fit:cover;
  }

  .layer{
    position:absolute;
    inset:0;
  }

  .para{
    position:absolute;
    top:24%;
    left:50%;
    transform:translateX(-50%);
    font-size:2.1rem;
    font-family:Georgia;
    font-weight:bold;
    text-align:center;
    width:70%;
  }

  .de{
    position:absolute;
    top:32%;
    left:50%;
    transform:translateX(-50%);
    font-size:1.5rem;
    text-align:center;
    width:70%;
  }

  .tipo{
    position:absolute;
    top:50.3%;
    left:50%;
    transform:translateX(-50%);
    font-size:2rem;
    font-weight:bold;
    text-align:center;
    width:70%;
  }

  .plantula{
    position:absolute;
    top:63.8%;
    left:50%;
    transform:translateX(-50%);
    font-size:1.9rem;
    font-family:Georgia;
    text-align:center;
    width:70%;
  }

</style>
</head>

<body>

<div class="topbar">
  <button class="btn" onclick="window.print()">Descargar PDF</button>
</div>

<div class="sheet">
  <img class="bg" src="fondo.png">

  <div class="layer">
    <div class="para" id="para">Para: —</div>
    <div class="de" id="de">De: —</div>
    <div class="tipo" id="tipo">Adopción</div>
    <div class="plantula" id="plantula"></div>
  </div>
</div>

<script>
function qs(n){
  return new URLSearchParams(window.location.search).get(n) || "";
}

function clean(v){
  if(!v || v.includes("{{")) return "";
  return decodeURIComponent(v.replace(/\+/g," "));
}

const quienRegala = clean(qs("nombre"));
const quienRecibe = clean(qs("regalo"));
const frailejon = clean(qs("frailejon"));
const planta = clean(qs("planta"));
const adopcion = clean(qs("adopcion"));

if(quienRecibe){
  document.getElementById("para").textContent = "Para: " + quienRecibe;
}

if(quienRegala){
  document.getElementById("de").textContent = "De: " + quienRegala;
}

let tipo = "Adopción";

if(frailejon && planta){
  tipo = "Frailejón y planta nativa";
}else if(frailejon){
  tipo = "Frailejón";
}else if(planta){
  tipo = "Planta nativa";
}

document.getElementById("tipo").textContent = tipo;

if(adopcion){
  document.getElementById("plantula").textContent = adopcion;
}
</script>

</body>
</html>
