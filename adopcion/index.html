<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Certificado</title>

<style>
  body{
    margin:0;
    background:#ccc;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
  }

  .sheet{
    position:relative;
    width:1200px;
    height:650px;
    background:url("fondo.png") no-repeat center;
    background-size:cover;
    box-shadow:0 20px 40px rgba(0,0,0,.2);
  }

  /* BOTÓN */
  .btn{
    position:absolute;
    top:15px;
    right:15px;
    padding:10px 14px;
    background:black;
    color:white;
    border:none;
    cursor:pointer;
    font-size:13px;
  }

  /* NOMBRE (línea de "concedido a") */
  .nombre{
    position:absolute;
    top:210px;
    left:50%;
    transform:translateX(-50%);
    font-size:34px;
    font-family:Georgia;
    font-weight:bold;
    text-align:center;
    width:70%;
  }

  /* TIPO DE ADOPCIÓN */
  .tipo{
    position:absolute;
    top:300px;
    left:50%;
    transform:translateX(-50%);
    font-size:28px;
    font-weight:bold;
    text-align:center;
    width:70%;
  }

  /* FRAILEJÓN */
  .frailejon{
    position:absolute;
    top:360px;
    left:50%;
    transform:translateX(-50%);
    font-size:26px;
    text-align:center;
    width:70%;
  }

  /* PLANTA */
  .planta{
    position:absolute;
    top:420px;
    left:50%;
    transform:translateX(-50%);
    font-size:26px;
    text-align:center;
    width:70%;
  }

</style>
</head>

<body>

<div class="sheet">

  <button class="btn" onclick="window.print()">Descargar PDF</button>

  <div class="nombre" id="nombre">Adoptante</div>
  <div class="tipo" id="tipo">Adopción</div>
  <div class="frailejon" id="frailejon"></div>
  <div class="planta" id="planta"></div>

</div>

<script>
  function qs(n){
    const p = new URLSearchParams(window.location.search);
    return p.get(n) || "";
  }

  const nombre = qs("nombre");
  const frailejon = qs("frailejon");
  const planta = qs("planta");

  if(nombre && !nombre.includes("{{")){
    document.getElementById("nombre").textContent = nombre;
  }

  if(frailejon && !frailejon.includes("{{")){
    document.getElementById("frailejon").textContent = frailejon;
  }

  if(planta && !planta.includes("{{")){
    document.getElementById("planta").textContent = planta;
  }

  let tipo = "Adopción";

  if(frailejon && planta){
    tipo = "Combo";
  } else if(frailejon){
    tipo = "Frailejón";
  } else if(planta){
    tipo = "Planta nativa";
  }

  document.getElementById("tipo").textContent = tipo;
</script>

</body>
</html>
