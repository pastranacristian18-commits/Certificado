<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Certificado</title>

<style>
  html, body{
    margin:0;
    padding:0;
    background:#d9d9d9;
    font-family:Arial, Helvetica, sans-serif;
  }

  body{
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:flex-start;
    padding:18px;
  }

  .topbar{
    width:min(1200px,100%);
    margin:0 auto 12px auto;
    display:flex;
    justify-content:flex-end;
  }

  .btn{
    appearance:none;
    border:none;
    background:#111;
    color:#fff;
    cursor:pointer;
    padding:12px 18px;
    border-radius:999px;
    font-size:14px;
    font-weight:700;
  }

  .sheet{
    position:relative;
    width:min(1200px,100%);
    aspect-ratio: 1536 / 942;
    box-shadow:0 20px 40px rgba(0,0,0,.18);
    overflow:hidden;
    background:#eef3f3;
  }

  .bg{
    position:absolute;
    inset:0;
    width:100%;
    height:100%;
    object-fit:cover;
    z-index:1;
    user-select:none;
    pointer-events:none;
  }

  .layer{
    position:absolute;
    inset:0;
    z-index:2;
  }

  .nombre,
  .tipo,
  .frailejon,
  .planta{
    position:absolute;
    left:50%;
    transform:translateX(-50%);
    width:72%;
    text-align:center;
    color:#111;
    word-break:break-word;
  }

  .nombre{
    top:24.5%;
    font-size:2.15rem;
    line-height:1.2;
    font-family:Georgia, "Times New Roman", serif;
    font-weight:700;
  }

  .tipo{
    top:43.2%;
    font-size:2.05rem;
    line-height:1.2;
    font-weight:800;
  }

  .frailejon{
    top:56.1%;
    font-size:1.9rem;
    line-height:1.25;
    font-family:Georgia, "Times New Roman", serif;
    font-weight:700;
  }

  .planta{
    top:67.2%;
    font-size:1.9rem;
    line-height:1.25;
    font-family:Georgia, "Times New Roman", serif;
    font-weight:700;
  }

  .hidden{
    display:none !important;
  }

  @page{
    size: letter landscape;
    margin: 0;
  }

  @media print{
    html, body{
      width:100%;
      height:100%;
      background:#fff !important;
      margin:0;
      padding:0;
    }

    body{
      display:block;
    }

    .topbar{
      display:none !important;
    }

    .sheet{
      width:100vw;
      height:auto;
      box-shadow:none;
      margin:0;
    }
  }

  @media (max-width: 900px){
    .nombre{ font-size:1.45rem; }
    .tipo{ font-size:1.35rem; }
    .frailejon,.planta{ font-size:1.2rem; }
  }
</style>
</head>
<body>

<div class="topbar">
  <button class="btn" onclick="window.print()">Descargar / Guardar PDF</button>
</div>

<div class="sheet">
  <img class="bg" src="fondo.png" alt="Certificado de adopción">

  <div class="layer">
    <div class="nombre" id="nombre">Adoptante</div>
    <div class="tipo" id="tipo">Adopción</div>
    <div class="frailejon" id="frailejon"></div>
    <div class="planta" id="planta"></div>
  </div>
</div>

<script>
  function qs(name){
    const params = new URLSearchParams(window.location.search);
    return params.get(name) || "";
  }

  function clean(value){
    const v = String(value || "").trim();
    if (!v) return "";
    if (v.includes("{{")) return "";
    return decodeURIComponent(v.replace(/\+/g, " "));
  }

  const nombre = clean(qs("nombre"));
  const frailejon = clean(qs("frailejon"));
  const planta = clean(qs("planta"));

  const nombreEl = document.getElementById("nombre");
  const tipoEl = document.getElementById("tipo");
  const frailejonEl = document.getElementById("frailejon");
  const plantaEl = document.getElementById("planta");

  if (nombre) {
    nombreEl.textContent = nombre;
  }

  if (frailejon) {
    frailejonEl.textContent = frailejon;
  } else {
    frailejonEl.classList.add("hidden");
  }

  if (planta) {
    plantaEl.textContent = planta;
  } else {
    plantaEl.classList.add("hidden");
  }

  let tipo = "Adopción";
  if (frailejon && planta) {
    tipo = "Combo";
  } else if (frailejon) {
    tipo = "Frailejón";
  } else if (planta) {
    tipo = "Planta nativa";
  }

  tipoEl.textContent = tipo;
</script>

</body>
</html>
