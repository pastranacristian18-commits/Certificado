<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Certificado</title>

<style>
  html, body{
    margin:0;
    padding:0;
    background:#d9d9d9;
    font-family:Arial, Helvetica, sans-serif;
  }

  body{
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:flex-start;
    padding:18px;
  }

  .topbar{
    width:min(1200px,100%);
    margin:0 auto 12px auto;
    display:flex;
    justify-content:flex-end;
  }

  .btn{
    appearance:none;
    border:none;
    background:#111;
    color:#fff;
    cursor:pointer;
    padding:12px 18px;
    border-radius:999px;
    font-size:14px;
    font-weight:700;
  }

  .sheet{
    position:relative;
    width:min(1200px,100%);
    aspect-ratio: 1536 / 942;
    box-shadow:0 20px 40px rgba(0,0,0,.18);
    overflow:hidden;
    background:#eef3f3;
  }

  .bg{
    position:absolute;
    inset:0;
    width:100%;
    height:100%;
    object-fit:cover;
    z-index:1;
    user-select:none;
    pointer-events:none;
  }

  .layer{
    position:absolute;
    inset:0;
    z-index:2;
  }

  .adoptante,
  .tipo,
  .plantula{
    position:absolute;
    left:50%;
    transform:translateX(-50%);
    width:72%;
    text-align:center;
    color:#111;
    word-break:break-word;
  }

  /* concedido a: */
  .adoptante{
    top:84.3%;
    font-size:2.15rem;
    line-height:1.15;
    font-family:Georgia, "Times New Roman", serif;
    font-weight:700;
  }

  /* tipo de adopción */
  .tipo{
    top:63.7%;
    font-size:2.05rem;
    line-height:1.2;
    font-weight:800;
  }

  /* nombre de la plántula */
  .plantula{
    top:87.2%;
    font-size:2.0rem;
    line-height:1.22;
    font-family:Georgia, "Times New Roman", serif;
    font-weight:700;
  }

  .hidden{
    display:none !important;
  }

  @page{
    size: letter landscape;
    margin: 0;
  }

  @media print{
    html, body{
      width:100%;
      height:100%;
      background:#fff !important;
      margin:0;
      padding:0;
    }

    body{
      display:block;
    }

    .topbar{
      display:none !important;
    }

    .sheet{
      width:100vw;
      height:auto;
      box-shadow:none;
      margin:0;
    }
  }

  @media (max-width: 900px){
    .adoptante{ font-size:1.45rem; }
    .tipo{ font-size:1.35rem; }
    .plantula{ font-size:1.2rem; }
  }
</style>
</head>
<body>

<div class="topbar">
  <button class="btn" onclick="window.print()">Descargar / Guardar PDF</button>
</div>

<div class="sheet">
  <img class="bg" src="fondo.png" alt="Certificado de adopción">

  <div class="layer">
    <div class="adoptante" id="adoptante">Adoptante</div>
    <div class="tipo" id="tipo">Adopción</div>
    <div class="plantula" id="plantula">Nombre de la plántula</div>
  </div>
</div>

<script>
  function qs(name){
    const params = new URLSearchParams(window.location.search);
    return params.get(name) || "";
  }

  function clean(value){
    const v = String(value || "").trim();
    if (!v) return "";
    if (v.includes("{{")) return "";
    return decodeURIComponent(v.replace(/\+/g, " "));
  }

  const nombre    = clean(qs("nombre"));     // adoptante
  const frailejon = clean(qs("frailejon"));  // si existe, eligió frailejón
  const planta    = clean(qs("planta"));     // si existe, eligió planta nativa
  const adopcion  = clean(qs("adopcion"));   // nombre que le puso a su adopción

  const adoptanteEl = document.getElementById("adoptante");
  const tipoEl      = document.getElementById("tipo");
  const plantulaEl  = document.getElementById("plantula");

  // Adoptante
  if (nombre) {
    adoptanteEl.textContent = nombre;
  } else {
    adoptanteEl.textContent = "Adoptante";
  }

  // Tipo de adopción
  let tipo = "Adopción";
  if (frailejon && planta) {
    tipo = "Frailejón y planta nativa";
  } else if (frailejon) {
    tipo = "Frailejón";
  } else if (planta) {
    tipo = "Planta nativa";
  }
  tipoEl.textContent = tipo;

  // Nombre de la plántula = nombre que puso a la adopción
  if (adopcion) {
    plantulaEl.textContent = adopcion;
  } else {
    plantulaEl.textContent = "Nombre de la plántula";
  }
</script>

</body>
</html>
